spring.config.import=optional:file:env.properties
spring.application.name=${DB_NAME}
# SERVER CONFIG
server.port=${PORT}
# DB CONFIG
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/your_local_db_name}spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver=org.postgresql.Driver
# HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=50
# JWT
jwt.secret=${JWT_SECRET}
#CLOUDINARY
cloudinary.name=${CLOUDINARY_NAME}
cloudinary.apiKey=${CLOUDINARY_API_KEY}
cloudinary.secret=${CLOUDINARY_API_SECRET}
# MAILGUN
mailgun.domainName=${MAILGUN_DOMAIN_NAME}
mailgun.apiKey=${MAILGUN_API_KEY}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
# Local Development Environment
app.frontend.url=http://localhost:5173
