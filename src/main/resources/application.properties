spring.config.import=optional:file:env.properties
spring.application.name=householdchores
# SERVER CONFIG
server.port=${PORT:3001}

# DB CONFIG — Simplest direct property lookup
#spring.datasource.url=${SPRING_DATASOURCE_URL}
